name: KPI Platform CI

on:
  pull_request:
  push:
    branches:
      - main
      - cursor-local-snapshot

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Build
        env:
          # CI icin dummy Supabase degerleri. Gercek prod degerleri Vercel Environment Variables icinde tutulur.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
        run: npm run build
